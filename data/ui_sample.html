<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 300px;
            padding: 20px;
        }
        .logo {
            width: 100px;
            height: 100px;
            background-color: #CCCCCC;
            margin: 0 auto 50px auto;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #F0F0F0;
            border: 1px solid #999999;
            color: #333;
        }
        input::placeholder {
            color: #DDDDDD; /* Low contrast placeholder */
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .forgot-password {
            text-align: center;
            margin-top: 10px;
            color: #007BFF;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" id="logo"></div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <button class="login-btn" id="login-btn">Login</button>
        <div class="forgot-password" id="forgot-password">Forgot Password?</div>
    </div>
</body>
</html>
